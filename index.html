<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Inscrição — Capacitação SIGESB</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 2rem 1rem 4rem;
    }

    .card {
      width: 100%;
      max-width: 520px;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
    }

    .hero {
      background: #0a2d6b;
      padding: 2rem 1.75rem 1.5rem;
      position: relative;
      overflow: hidden;
    }
    .hero::before {
      content: '';
      position: absolute;
      top: -50px; right: -50px;
      width: 220px; height: 220px;
      border-radius: 50%;
      background: rgba(255,255,255,0.04);
    }
    .hero::after {
      content: '';
      position: absolute;
      bottom: -30px; left: 60px;
      width: 160px; height: 160px;
      border-radius: 50%;
      background: rgba(255,255,255,0.03);
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(255,255,255,0.12);
      border: 0.5px solid rgba(255,255,255,0.2);
      border-radius: 100px;
      padding: 4px 12px;
      font-size: 11px;
      font-weight: 500;
      color: #a8f0d0;
      margin-bottom: 1rem;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    .badge::before {
      content: '';
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #2dd882;
      display: inline-block;
    }

    .hero h1 {
      font-size: 24px;
      font-weight: 600;
      color: #fff;
      line-height: 1.3;
      margin-bottom: 0.25rem;
    }
    .hero h1 span { color: #2dd882; }

    .hero-sub {
      font-size: 13px;
      color: rgba(255,255,255,0.6);
      margin-bottom: 1.25rem;
    }

    .chips {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .chip {
      display: flex;
      align-items: center;
      gap: 6px;
      background: rgba(255,255,255,0.1);
      border-radius: 8px;
      padding: 6px 12px;
      font-size: 12px;
      color: rgba(255,255,255,0.85);
    }
    .chip i { font-size: 14px; color: #2dd882; }

    .form-body {
      background: #fff;
      padding: 1.75rem;
    }

    .field { margin-bottom: 1.25rem; }
    .field label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: #4a5568;
      margin-bottom: 6px;
    }
    .field label span { color: #e53e3e; margin-left: 2px; }

    .field input {
      width: 100%;
      height: 42px;
      padding: 0 12px;
      font-size: 14px;
      font-family: 'Inter', sans-serif;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      background: #fff;
      color: #1a202c;
      transition: border-color 0.15s, box-shadow 0.15s;
      outline: none;
    }
    .field input:focus {
      border-color: #185FA5;
      box-shadow: 0 0 0 3px rgba(24,95,165,0.12);
    }
    .field input::placeholder { color: #a0aec0; }

    .dates-label {
      font-size: 13px;
      font-weight: 500;
      color: #4a5568;
      margin-bottom: 8px;
    }
    .dates-label span { color: #e53e3e; margin-left: 2px; }

    .dates-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(88px, 1fr));
      gap: 8px;
      margin-bottom: 1.5rem;
    }
    .date-option { position: relative; }
    .date-option input[type="radio"] {
      position: absolute;
      opacity: 0;
      width: 0; height: 0;
    }
    .date-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 3px;
      padding: 12px 6px;
      border: 1px solid #e2e8f0;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.15s;
      background: #f7fafc;
      text-align: center;
      user-select: none;
    }
    .date-card:hover {
      border-color: #185FA5;
      background: #EBF4FF;
    }
    .date-option input:checked + .date-card {
      border: 2px solid #185FA5;
      background: #EBF4FF;
    }
    .date-weekday {
      font-size: 10px;
      font-weight: 600;
      color: #185FA5;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .date-day {
      font-size: 22px;
      font-weight: 600;
      color: #1a202c;
      line-height: 1;
    }
    .date-month {
      font-size: 11px;
      color: #718096;
    }
    .date-option input:checked + .date-card .date-weekday,
    .date-option input:checked + .date-card .date-day { color: #0C447C; }

    .submit-btn {
      width: 100%;
      height: 46px;
      background: #0a2d6b;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 500;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: background 0.15s, transform 0.1s;
    }
    .submit-btn:hover { background: #0f3d94; }
    .submit-btn:active { transform: scale(0.99); }
    .submit-btn i { font-size: 18px; }

    .success-msg {
      display: none;
      flex-direction: column;
      align-items: center;
      text-align: center;
      padding: 1.5rem 0 1rem;
      gap: 12px;
    }
    .success-icon {
      width: 60px; height: 60px;
      background: #F0FFF4;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
    }
    .success-icon i { font-size: 30px; color: #276749; }
    .success-msg h3 { font-size: 18px; font-weight: 600; color: #1a202c; }
    .success-msg p { font-size: 14px; color: #718096; max-width: 300px; line-height: 1.6; }

    .new-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      height: 38px;
      padding: 0 1.25rem;
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      font-family: 'Inter', sans-serif;
      color: #1a202c;
      cursor: pointer;
      margin-top: 0.5rem;
      transition: background 0.15s;
    }
    .new-btn:hover { background: #f7fafc; }

    .divider {
      border: none;
      border-top: 1px solid #f0f4f8;
      margin: 1.5rem 0 1.25rem;
    }

    .reg-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1rem;
    }
    .reg-header h3 { font-size: 13px; font-weight: 500; color: #718096; }
    .reg-count {
      font-size: 12px;
      background: #f7fafc;
      border: 1px solid #e2e8f0;
      border-radius: 100px;
      padding: 2px 10px;
      color: #718096;
    }

    .reg-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 0;
      border-bottom: 1px solid #f0f4f8;
    }
    .reg-item:last-child { border-bottom: none; }

    .reg-avatar {
      width: 36px; height: 36px;
      border-radius: 50%;
      background: #EBF4FF;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px;
      font-weight: 600;
      color: #0C447C;
      flex-shrink: 0;
    }
    .reg-info { flex: 1; min-width: 0; }
    .reg-name { font-size: 14px; font-weight: 500; color: #1a202c; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .reg-school { font-size: 12px; color: #718096; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    .reg-date {
      font-size: 11px;
      background: #EBF4FF;
      color: #0C447C;
      border-radius: 6px;
      padding: 3px 8px;
      white-space: nowrap;
      flex-shrink: 0;
      font-weight: 500;
    }

    .empty-state {
      text-align: center;
      padding: 1.5rem;
      font-size: 13px;
      color: #a0aec0;
    }

    .suporte {
      text-align: center;
      margin-top: 1.25rem;
      font-size: 12px;
      color: #a0aec0;
    }
    .suporte a { color: #185FA5; text-decoration: none; }

    @media (max-width: 480px) {
      body { padding: 0; align-items: stretch; }
      .card { border-radius: 0; box-shadow: none; max-width: 100%; }
    }
  </style>
</head>
<body>

<div class="card">
  <div class="hero">
    <div class="badge">Capacitação online · ao vivo</div>
    <h1>Capacitação online para <span>professores</span></h1>
    <p class="hero-sub">Atenção, professores e professoras de Santa Bárbara!</p>
    <div class="chips">
      <div class="chip"><i class="ti ti-book" aria-hidden="true"></i> SIGESB na Gestão Pedagógica</div>
      <div class="chip"><i class="ti ti-clock" aria-hidden="true"></i> 11h30</div>
      <div class="chip"><i class="ti ti-broadcast" aria-hidden="true"></i> Ao vivo</div>
    </div>
  </div>

  <div class="form-body">
    <div id="form-content">
      <div class="field">
        <label for="f-nome">Nome completo <span>*</span></label>
        <input type="text" id="f-nome" placeholder="Seu nome completo" autocomplete="name" />
      </div>
      <div class="field">
        <label for="f-escola">Escola <span>*</span></label>
        <input type="text" id="f-escola" placeholder="Nome da sua escola" />
      </div>
      <div class="field">
        <label for="f-whatsapp">WhatsApp <span>*</span></label>
        <input type="tel" id="f-whatsapp" placeholder="(91) 99999-9999" autocomplete="tel" />
      </div>

      <div>
        <p class="dates-label">Escolha a quarta-feira <span>*</span></p>
        <div class="dates-grid" id="dates-grid"></div>
      </div>

      <button class="submit-btn" onclick="submitForm()">
        <i class="ti ti-send" aria-hidden="true"></i>
        Confirmar inscrição
      </button>
    </div>

    <div class="success-msg" id="success-msg">
      <div class="success-icon"><i class="ti ti-check" aria-hidden="true"></i></div>
      <h3>Inscrição confirmada!</h3>
      <p id="success-text"></p>
      <button class="new-btn" onclick="newForm()">
        <i class="ti ti-plus" aria-hidden="true"></i> Nova inscrição
      </button>
    </div>

    <hr class="divider" />

    <div class="reg-header">
      <h3>Inscrições recebidas</h3>
      <span class="reg-count" id="reg-count">0 inscritos</span>
    </div>
    <div id="reg-list">
      <div class="empty-state">Nenhuma inscrição ainda.</div>
    </div>

    <p class="suporte">
      <i class="ti ti-headset" aria-hidden="true"></i>
      Suporte: <a href="tel:+5591984318116">(91) 98431-8116</a>
    </p>
  </div>
</div>

<script>
  const STORAGE_KEY = 'sigesb-inscricoes-v1';

  function getWednesdays() {
    const dates = [];
    const today = new Date();
    let d = new Date(today);
    const day = d.getDay();
    const diff = (3 - day + 7) % 7 || 7;
    d.setDate(d.getDate() + diff);
    for (let i = 0; i < 5; i++) {
      dates.push(new Date(d));
      d.setDate(d.getDate() + 7);
    }
    return dates;
  }

  function formatDate(d) {
    return d.toLocaleDateString('pt-BR', { day: '2-digit', month: '2-digit', year: 'numeric' });
  }

  function buildDates() {
    const grid = document.getElementById('dates-grid');
    const months = ['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];
    getWednesdays().forEach((d, i) => {
      const opt = document.createElement('div');
      opt.className = 'date-option';
      opt.innerHTML = `
        <input type="radio" name="data" id="d${i}" value="${formatDate(d)}">
        <label class="date-card" for="d${i}">
          <span class="date-weekday">Qua</span>
          <span class="date-day">${d.getDate()}</span>
          <span class="date-month">${months[d.getMonth()]} ${d.getFullYear()}</span>
        </label>`;
      grid.appendChild(opt);
    });
  }

  function loadRegistrations() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      return raw ? JSON.parse(raw) : [];
    } catch { return []; }
  }

  function saveRegistrations(list) {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(list)); } catch {}
  }

  function initials(name) {
    return name.trim().split(' ').filter(Boolean).slice(0, 2).map(w => w[0].toUpperCase()).join('');
  }

  function renderList() {
    const list = loadRegistrations();
    const el = document.getElementById('reg-list');
    const count = document.getElementById('reg-count');
    count.textContent = `${list.length} inscrito${list.length !== 1 ? 's' : ''}`;
    if (!list.length) {
      el.innerHTML = '<div class="empty-state">Nenhuma inscrição ainda.</div>';
      return;
    }
    el.innerHTML = [...list].reverse().map(r => `
      <div class="reg-item">
        <div class="reg-avatar">${initials(r.nome)}</div>
        <div class="reg-info">
          <div class="reg-name">${r.nome}</div>
          <div class="reg-school">${r.escola}</div>
        </div>
        <span class="reg-date">${r.data}</span>
      </div>`).join('');
  }

  async function submitForm() {
    const nome = document.getElementById('f-nome').value.trim();
    const escola = document.getElementById('f-escola').value.trim();
    const whatsapp = document.getElementById('f-whatsapp').value.trim();
    const dataEl = document.querySelector('input[name="data"]:checked');
    if (!nome || !escola || !whatsapp || !dataEl) {
      alert('Por favor, preencha todos os campos e escolha uma data.');
      return;
    }
    const reg = { nome, escola, whatsapp, data: dataEl.value, id: Date.now() };

    const btn = document.querySelector('.submit-btn');
    btn.disabled = true;
    btn.innerHTML = '<i class="ti ti-loader" aria-hidden="true"></i> Enviando...';

    try {
      const response = await fetch('https://formspree.io/f/xbdervld', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
        body: JSON.stringify({
          Nome: reg.nome,
          Escola: reg.escola,
          WhatsApp: reg.whatsapp,
          'Data escolhida': reg.data
        })
      });

      if (!response.ok) throw new Error('Erro no envio');

      const list = loadRegistrations();
      list.push(reg);
      saveRegistrations(list);

      document.getElementById('form-content').style.display = 'none';
      const sm = document.getElementById('success-msg');
      sm.style.display = 'flex';
      document.getElementById('success-text').textContent =
        `${nome}, sua vaga está garantida para quarta-feira ${reg.data} às 11h30. Fique atento ao seu WhatsApp!`;
      renderList();
    } catch (e) {
      alert('Erro ao enviar inscrição. Verifique sua conexão e tente novamente.');
    } finally {
      btn.disabled = false;
      btn.innerHTML = '<i class="ti ti-send" aria-hidden="true"></i> Confirmar inscrição';
    }
  }

  function newForm() {
    document.getElementById('form-content').style.display = 'block';
    document.getElementById('success-msg').style.display = 'none';
    ['f-nome', 'f-escola', 'f-whatsapp'].forEach(id => document.getElementById(id).value = '');
    document.querySelectorAll('input[name="data"]').forEach(r => r.checked = false);
  }

  buildDates();
  renderList();
</script>
</body>
</html>
